# SAT-PlantScan ML class mapping
# Architecture choice: EfficientNet-Lite0 (TFLite)
# Justification: best mobile trade-off (accuracy/speed/memory) for multi-class
# leaf disease classification with transfer learning on small datasets.
# YOLO is reserved for future localization tasks; current pipeline is classification.

project_root: ".."
dataset_source: "../Cultures/Cassava"
output_dir: "./artifacts"

image_size: 224
batch_size: 16
epochs: 25
learning_rate: 0.0003
validation_split: 0.2
test_split: 0.1
augmentation_factor: 8

classes:
  - id: cassava_mosaic_disease
    label: "Cassava Mosaic Disease"
    folders:
      - "01-VIROSES/MOSAIQUE AFRICAINE"
    ml_class_id: 0
  - id: cassava_brown_streak
    label: "Cassava Brown Streak"
    folders:
      - "01-VIROSES/STRITUIRE BRUNE"
    ml_class_id: 1
  - id: cassava_bacterial_blight
    label: "Cassava Bacterial Blight"
    folders:
      - "02-BACTERIOSES"
    ml_class_id: 2
  - id: anthracnose
    label: "Anthracnose"
    folders:
      - "03-MALADIES_CRYPTOGAMIQUES/ANTHRACNOSE"
    ml_class_id: 3
  - id: cercosporiosis
    label: "Cercosporiosis"
    folders:
      - "03-MALADIES_CRYPTOGAMIQUES/CERCOSPORIOSE"
    ml_class_id: 4
  - id: root_rot
    label: "Root Rot"
    folders:
      - "05-AUTRES MALADIES FONGIQUES/POURRITURE RACINAIRE"
    ml_class_id: 5
  - id: chlorosis
    label: "Chlorosis"
    folders:
      - "05-AUTRES MALADIES FONGIQUES/CHLOROSE"
    ml_class_id: 6
  - id: leaf_senescence
    label: "Leaf Senescence"
    folders:
      - "05-AUTRES MALADIES FONGIQUES/JAUNISSEMENT VIEULLESSE"
    ml_class_id: 7
  - id: pest_damage
    label: "Pest Damage"
    folders:
      - "04-RAVAGEURS"
    ml_class_id: 8
  - id: healthy
    label: "Healthy"
    folders:
      - "06-FEUILLES SAINES"
    ml_class_id: 9
